<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Tournoi Baby-Foot</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { color: #2c3e50; }
    .match { margin: 10px 0; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
    .score-input { width: 40px; text-align: center; }
    .winner { font-weight: bold; color: green; }
    button { margin-left: 10px; padding: 5px 10px; }
  </style>
</head>
<body>

  <h1>Tournoi Baby-Foot</h1>

  <!-- Inscriptions -->
  <h2>1 — Inscriptions</h2>
  <input type="text" id="playerName" placeholder="Nom joueur">
  <select id="playerRole">
    <option value="Attaquant">Attaquant</option>
    <option value="Défenseur">Défenseur</option>
    <option value="Polyvalent">Polyvalent</option>
  </select>
  <button onclick="addPlayer()">Ajouter</button>
  <button onclick="resetTournament()">Réinitialiser le tournoi</button>

  <div id="playersList"></div>

  <!-- Qualifications -->
  <h2>2 — Qualifications (DYP)</h2>
  <button onclick="generateRound()">Générer une manche DYP</button>
  <div id="qualifs"></div>

  <h3>Classement (qualifs)</h3>
  <div id="standings"></div>

  <!-- Phase finale -->
  <h2>3 — Phase finale (Double élimination)</h2>
  <label>Nombre de qualifiés :</label>
  <input type="number" id="finalistsNumber" value="8" min="2">
  <button onclick="startFinals()">Passer en phase finale</button>

  <div id="finals"></div>

  <script src="script.js"></script>
</body>
</html>
