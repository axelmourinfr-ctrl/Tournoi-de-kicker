<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Tournoi Baby-Foot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Tournoi Baby-Foot</h1>

  <!-- Section Inscriptions -->
  <section>
    <h2>1 — Inscriptions</h2>
    <input type="text" id="playerName" placeholder="Nom du joueur">
    <select id="playerRole">
      <option value="Attaquant">Attaquant</option>
      <option value="Défenseur">Défenseur</option>
      <option value="Polyvalent">Polyvalent</option>
    </select>
    <button onclick="addPlayer()">Ajouter</button>
    <button onclick="resetTournament()">Réinitialiser le tournoi</button>
    <div id="playerList"></div>
  </section>

  <!-- Section Qualifications -->
  <section>
    <h2>2 — Qualifications (DYP)</h2>
    <button onclick="generateDYP()">Générer une manche DYP</button>
    <div id="qualifMatches"></div>
    <h3>Classement (qualifs)</h3>
    <div id="ranking"></div>
  </section>

  <!-- Section Phase finale -->
  <section>
    <h2>3 — Phase finale (Double élimination)</h2>
    <label>Nombre de qualifiés :</label>
    <input type="number" id="numQualified" min="2" value="8">
    <button onclick="startFinalPhase()">Passer en phase finale</button>
    <div id="finalBracket"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
